name: Deploy
on:
  push:
    branches: [prod]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: /var/www/margus-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Build
        run: |
          npm ci
          npm run build
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          tar czf release.tar.gz -C .next/standalone .
      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: release.tar.gz
          target: /tmp
      - name: Restart app
        uses: appleboy/ssh-action@v1.2.0
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            mkdir -p ${{ env.DEPLOY_PATH }}
            find ${{ env.DEPLOY_PATH }} -mindepth 1 -delete
            tar xzf /tmp/release.tar.gz -C ${{ env.DEPLOY_PATH }}
            rm /tmp/release.tar.gz
            cd ${{ env.DEPLOY_PATH }}
            cat > .env.local <<EOF
            TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
            TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID
            EOF
            if pm2 describe margus-app > /dev/null 2>&1; then
              pm2 restart margus-app
            else
              HOSTNAME=127.0.0.1 PORT=3000 pm2 start server.js --name margus-app
              pm2 save
            fi
